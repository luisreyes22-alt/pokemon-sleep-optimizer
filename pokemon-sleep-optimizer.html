<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sleep Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D1B2A; color: #E8E4F0; font-family: Inter, sans-serif; }
.upload-zone { position: relative; border: 2px dashed rgba(75,45,143,0.5); border-radius: 16px;
  padding: 32px 20px; text-align: center; background: rgba(75,45,143,0.05); margin-bottom: 16px; overflow: hidden; }
.upload-zone input[type=file] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; font-size: 0; }
textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(75,45,143,0.4);
  border-radius: 12px; color: #E8E4F0; padding: 12px; font-family: monospace; font-size: 11px;
  resize: vertical; min-height: 120px; outline: none; }
textarea:focus { border-color: rgba(75,45,143,0.8); }
button { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const TIER_COLORS = { S:"#F0C040", A:"#2ECC8A", B:"#7EC8E3", C:"#A09BC0", D:"#555577" };
const TIER_BG = { S:"rgba(240,192,64,0.15)", A:"rgba(46,204,138,0.15)", B:"rgba(126,200,227,0.12)", C:"rgba(160,155,192,0.1)", D:"rgba(85,85,119,0.1)" };
const SUBSKILL_TIERS = {
  "Helping Speed M":"S","Helping Speed S":"S","Ingredient Finding M":"S",
  "Ingredient Finding S":"A","Skill Trigger M":"A","Skill Trigger S":"A",
  "Skill Level Up M":"B","Skill Level Up S":"B","Berry Finding S":"B","Inventory Up L":"B",
  "Inventory Up S":"C","Energy Recovery Bonus":"C",
  "Dream Shard Bonus":"D","Sleep EXP Bonus":"D","Research EXP Bonus":"D","Exp. Bonus":"D",
};
const TIER_SCORES = { S:5, A:4, B:3, C:2, D:1 };
const SLOT_WEIGHTS = { 10:1.5, 25:1.25, 50:1.0, 70:0.75, 80:0.5 };
const VIEWS = { COMPARE:"compare", ANALYZE:"analyze", ROSTER:"roster", ROSTER_ADD:"roster_add" };

// ── Helpers ──────────────────────────────────────────────────────────────────
const getTier = n => SUBSKILL_TIERS[n] || "C";
function scoreSubskills(subskills) {
  let s = 0;
  for (const [level, {name, locked}] of Object.entries(subskills)) {
    if (locked) continue;
    s += TIER_SCORES[getTier(name)] * (SLOT_WEIGHTS[parseInt(level)] || 1);
  }
  return Math.round(s * 10) / 10;
}
function freqToSecs(f) {
  const m = f.match(/(\d+)\s*min[s]?\s*(\d+)\s*sec[s]?/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 9999;
}
function totalScore(p) {
  return scoreSubskills(p.subskills) * 2 + 3600 / freqToSecs(p.frequency);
}

// ── Sub-components ───────────────────────────────────────────────────────────
function SubskillBadge({name, locked, level}) {
  const tier = getTier(name);
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,
      background:locked?"rgba(255,255,255,0.04)":TIER_BG[tier],
      border:`1px solid ${locked?"rgba(255,255,255,0.08)":TIER_COLORS[tier]+"55"}`,
      opacity:locked?0.5:1,marginBottom:5}}>
      <span style={{fontSize:10,fontWeight:700,color:locked?"#666":TIER_COLORS[tier],fontFamily:"monospace",minWidth:14}}>
        {locked?"🔒":tier}
      </span>
      <span style={{fontSize:11,color:locked?"#666":"#E8E4F0"}}>{name}</span>
      <span style={{fontSize:9,color:"#555577",marginLeft:"auto",fontFamily:"monospace"}}>Lv.{level}</span>
    </div>
  );
}

function RadarBar({label, value, max, color}) {
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontSize:10,color:"#A09BC0",fontFamily:"monospace"}}>{label}</span>
        <span style={{fontSize:10,color,fontFamily:"monospace",fontWeight:700}}>{value}</span>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2}}>
        <div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:2}}/>
      </div>
    </div>
  );
}

function PokemonCard({pokemon, rank, isWinner, onAddToRoster, inRoster, onRemoveFromRoster}) {
  const helpsPerHour = Math.round(3600 / freqToSecs(pokemon.frequency) * 10) / 10;
  const subskillScore = scoreSubskills(pokemon.subskills);
  const rankColors = ["#F0C040","#A09BC0","#CD7F32","#7EC8E3","#2ECC8A"];
  const rankLabels = ["#1 RECOMENDADO","#2","#3","#4","#5"];

  return (
    <div style={{background:isWinner?"linear-gradient(135deg,rgba(75,45,143,0.35),rgba(13,27,42,0.9))":"rgba(13,27,42,0.7)",
      border:`1px solid ${isWinner?"#4B2D8F":"rgba(255,255,255,0.07)"}`,borderRadius:16,padding:20,position:"relative",
      boxShadow:isWinner?"0 0 24px rgba(75,45,143,0.3)":"none",marginBottom:20}}>

      {rank !== undefined && (
        <div style={{position:"absolute",top:-10,left:16,background:rankColors[rank]||"#555577",color:"#0D1B2A",
          fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20}}>
          {rankLabels[rank]||`#${rank+1}`}
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:rank!==undefined?8:0,marginBottom:16}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#E8E4F0"}}>{pokemon.name}</div>
          <div style={{fontSize:12,color:"#A09BC0",fontFamily:"monospace"}}>{pokemon.species} · Lv.{pokemon.level} · {pokemon.specialty}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#F0C040",fontFamily:"monospace"}}>{(pokemon.rp||0).toLocaleString()}</div>
          <div style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>RP</div>
        </div>
      </div>

      <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:12,marginBottom:14}}>
        <RadarBar label="HELPS/HR" value={helpsPerHour} max={2.5} color="#2ECC8A"/>
        <RadarBar label="SUBSKILL SCORE" value={subskillScore} max={12} color="#7EC8E3"/>
        <RadarBar label="CARRY LIMIT" value={pokemon.carryLimit} max={25} color="#A09BC0"/>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"6px 10px",
        background:"rgba(255,255,255,0.04)",borderRadius:8,flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>NATURE</span>
        <span style={{fontSize:12,color:"#E8E4F0"}}>{pokemon.nature}</span>
        {pokemon.natureBuff && <span style={{fontSize:10,color:"#2ECC8A",marginLeft:"auto"}}>▲ {pokemon.natureBuff}</span>}
        {pokemon.natureNerf && <span style={{fontSize:10,color:"#E8604C"}}>▼ {pokemon.natureNerf}</span>}
        {!pokemon.natureBuff && !pokemon.natureNerf && <span style={{fontSize:10,color:"#555577",marginLeft:"auto"}}>neutro</span>}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,padding:"6px 10px",
        background:"rgba(255,255,255,0.04)",borderRadius:8}}>
        <span style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>FRECUENCIA</span>
        <span style={{fontSize:12,color:"#F0C040",fontFamily:"monospace"}}>{pokemon.frequency}</span>
      </div>

      <div style={{fontSize:10,color:"#555577",fontFamily:"monospace",marginBottom:8,letterSpacing:"0.08em"}}>SUBSKILLS</div>
      {Object.entries(pokemon.subskills).map(([level,{name,locked}])=>(
        <SubskillBadge key={level} name={name} locked={locked} level={level}/>
      ))}

      {pokemon.verdict && (
        <div style={{marginTop:14,padding:10,background:isWinner?"rgba(75,45,143,0.2)":"rgba(255,255,255,0.03)",
          borderRadius:8,borderLeft:`3px solid ${rankColors[rank]||"#555577"}`}}>
          <div style={{fontSize:11,color:"#A09BC0",lineHeight:1.5}}>{pokemon.verdict}</div>
        </div>
      )}

      {/* Roster button */}
      {onAddToRoster && !inRoster && (
        <button onClick={()=>onAddToRoster(pokemon)}
          style={{width:"100%",marginTop:14,padding:"10px",background:"rgba(46,204,138,0.15)",
            border:"1px solid rgba(46,204,138,0.4)",borderRadius:10,color:"#2ECC8A",
            fontSize:12,fontWeight:700,letterSpacing:"0.05em"}}>
          + AGREGAR AL ROSTER
        </button>
      )}
      {inRoster && (
        <div style={{width:"100%",marginTop:14,padding:"10px",background:"rgba(46,204,138,0.08)",
          border:"1px solid rgba(46,204,138,0.2)",borderRadius:10,color:"#2ECC8A",
          fontSize:12,fontWeight:700,letterSpacing:"0.05em",textAlign:"center"}}>
          ✓ EN TU ROSTER
        </div>
      )}
      {onRemoveFromRoster && (
        <button onClick={()=>onRemoveFromRoster(pokemon.id)}
          style={{width:"100%",marginTop:8,padding:"8px",background:"rgba(232,96,76,0.1)",
            border:"1px solid rgba(232,96,76,0.3)",borderRadius:10,color:"#E8604C",
            fontSize:11,fontWeight:600}}>
          🗑 REMOVER DEL ROSTER
        </button>
      )}
    </div>
  );
}

// ── Analyze View ─────────────────────────────────────────────────────────────
function AnalyzeView({onAnalyzed}) {
  const [jsonText, setJsonText] = useState("");
  const [images, setImages] = useState([]);
  const [error, setError] = useState("");

  const PROMPT = `Analiza estos screenshots de Pokémon Sleep y devuelve SOLO un array JSON válido, sin texto adicional ni backticks. Cada objeto debe tener exactamente estos campos:
{
  "name": "nombre del pokemon",
  "species": "especie (ej Latios)",
  "level": 27,
  "rp": 1427,
  "frequency": "38 mins 2 secs",
  "carryLimit": 19,
  "specialty": "Berries",
  "nature": "Bashful",
  "natureBuff": null,
  "natureNerf": null,
  "subskills": {
    "10": {"name": "Helping Speed M", "locked": false},
    "25": {"name": "Skill Level Up S", "locked": false},
    "50": {"name": "Helping Speed S", "locked": true},
    "70": {"name": "Dream Shard Bonus", "locked": true},
    "80": {"name": "Research EXP Bonus", "locked": true}
  }
}`;

  function handlePaste() {
    setError("");
    try {
      const clean = jsonText.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      const withIds = arr.map(p => ({...p, id: p.name + "_" + Date.now() + Math.random()}));
      onAnalyzed(withIds);
    } catch(e) {
      setError("JSON inválido. Asegúrate de copiar exactamente lo que Claude te devolvió.");
    }
  }

  return (
    <div>
      <div style={{textAlign:"center",padding:"16px 0 20px"}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Analizar Pokémon</div>
        <div style={{fontSize:12,color:"#A09BC0",lineHeight:1.6}}>
          Sube los screenshots en el chat de Claude.ai,<br/>pega aquí el JSON que te devuelva.
        </div>
      </div>

      {/* Step 1 */}
      <div style={{background:"rgba(75,45,143,0.1)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"#4B2D8F",fontFamily:"monospace",marginBottom:8,letterSpacing:"0.08em"}}>
          PASO 1 — COPIA ESTE PROMPT
        </div>
        <div style={{fontSize:11,color:"#A09BC0",lineHeight:1.6,marginBottom:10,fontFamily:"monospace",
          background:"rgba(0,0,0,0.2)",padding:10,borderRadius:8,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
          {PROMPT}
        </div>
        <button onClick={()=>navigator.clipboard?.writeText(PROMPT)}
          style={{width:"100%",padding:"8px",background:"rgba(75,45,143,0.3)",border:"1px solid rgba(75,45,143,0.5)",
            borderRadius:8,color:"#E8E4F0",fontSize:11,fontWeight:600,letterSpacing:"0.05em"}}>
          📋 COPIAR PROMPT
        </button>
      </div>

      {/* Step 2 */}
      <div style={{background:"rgba(75,45,143,0.1)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"#4B2D8F",fontFamily:"monospace",marginBottom:8,letterSpacing:"0.08em"}}>
          PASO 2 — VE A CLAUDE.AI
        </div>
        <div style={{fontSize:12,color:"#A09BC0",lineHeight:1.6}}>
          Abre claude.ai, sube los screenshots de tus Pokémon y pega el prompt de arriba. Claude te devolverá un JSON.
        </div>
      </div>

      {/* Step 3 */}
      <div style={{background:"rgba(75,45,143,0.1)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"#4B2D8F",fontFamily:"monospace",marginBottom:8,letterSpacing:"0.08em"}}>
          PASO 3 — PEGA EL JSON AQUÍ
        </div>
        <textarea
          value={jsonText}
          onChange={e=>setJsonText(e.target.value)}
          placeholder='[{"name":"Pochi","species":"Latios",...}]'
        />
        {error && (
          <div style={{marginTop:8,fontSize:11,color:"#E8604C",fontFamily:"monospace"}}>{error}</div>
        )}
      </div>

      <button onClick={handlePaste} disabled={!jsonText.trim()}
        style={{width:"100%",padding:14,
          background:jsonText.trim()?"linear-gradient(135deg,#4B2D8F,#7B4DBF)":"rgba(255,255,255,0.05)",
          border:"none",borderRadius:12,
          color:jsonText.trim()?"#E8E4F0":"#555577",
          fontSize:14,fontWeight:700,letterSpacing:"0.08em"}}>
        🔍 CARGAR Y COMPARAR
      </button>
    </div>
  );
}

// ── Roster Add View ───────────────────────────────────────────────────────────
function RosterAddView({onAdd, onBack}) {
  const [jsonText, setJsonText] = useState("");
  const [error, setError] = useState("");

  const PROMPT = `Analiza este screenshot de Pokémon Sleep y devuelve SOLO un objeto JSON válido (no array), sin texto adicional ni backticks:
{
  "name": "nombre",
  "species": "especie",
  "level": 27,
  "rp": 1427,
  "frequency": "38 mins 2 secs",
  "carryLimit": 19,
  "specialty": "Berries",
  "nature": "Bashful",
  "natureBuff": null,
  "natureNerf": null,
  "subskills": {
    "10": {"name": "Helping Speed M", "locked": false},
    "25": {"name": "Skill Level Up S", "locked": false},
    "50": {"name": "Helping Speed S", "locked": true},
    "70": {"name": "Dream Shard Bonus", "locked": true},
    "80": {"name": "Research EXP Bonus", "locked": true}
  }
}`;

  function handleAdd() {
    setError("");
    try {
      const clean = jsonText.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      const withIds = arr.map(p => ({...p, id: p.name + "_" + Date.now() + Math.random()}));
      withIds.forEach(p => onAdd(p));
      onBack();
    } catch(e) {
      setError("JSON inválido. Copia exactamente lo que Claude te devolvió.");
    }
  }

  return (
    <div>
      <div style={{textAlign:"center",padding:"16px 0 20px"}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Agregar al Roster</div>
        <div style={{fontSize:12,color:"#A09BC0"}}>Agrega un Pokémon directamente sin comparar</div>
      </div>

      <div style={{background:"rgba(75,45,143,0.1)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"#4B2D8F",fontFamily:"monospace",marginBottom:8}}>PROMPT PARA CLAUDE.AI</div>
        <div style={{fontSize:11,color:"#A09BC0",background:"rgba(0,0,0,0.2)",padding:10,borderRadius:8,
          fontFamily:"monospace",whiteSpace:"pre-wrap",wordBreak:"break-word",marginBottom:10}}>
          {PROMPT}
        </div>
        <button onClick={()=>navigator.clipboard?.writeText(PROMPT)}
          style={{width:"100%",padding:"8px",background:"rgba(75,45,143,0.3)",border:"1px solid rgba(75,45,143,0.5)",
            borderRadius:8,color:"#E8E4F0",fontSize:11,fontWeight:600}}>
          📋 COPIAR PROMPT
        </button>
      </div>

      <div style={{background:"rgba(75,45,143,0.1)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"#4B2D8F",fontFamily:"monospace",marginBottom:8}}>PEGA EL JSON AQUÍ</div>
        <textarea value={jsonText} onChange={e=>setJsonText(e.target.value)}
          placeholder='{"name":"Pochi","species":"Latios",...}'/>
        {error && <div style={{marginTop:8,fontSize:11,color:"#E8604C",fontFamily:"monospace"}}>{error}</div>}
      </div>

      <button onClick={handleAdd} disabled={!jsonText.trim()}
        style={{width:"100%",padding:14,marginBottom:10,
          background:jsonText.trim()?"linear-gradient(135deg,#2ECC8A,#1a9960)":"rgba(255,255,255,0.05)",
          border:"none",borderRadius:12,
          color:jsonText.trim()?"#0D1B2A":"#555577",
          fontSize:14,fontWeight:700,letterSpacing:"0.08em"}}>
        + AGREGAR AL ROSTER
      </button>
      <button onClick={onBack}
        style={{width:"100%",padding:12,background:"transparent",
          border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"#A09BC0",fontSize:13}}>
        Cancelar
      </button>
    </div>
  );
}

// ── Roster View ───────────────────────────────────────────────────────────────
function RosterView({roster, onRemove, onAddNew}) {
  if (roster.length === 0) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:40,marginBottom:16}}>🌙</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Tu roster está vacío</div>
      <div style={{fontSize:13,color:"#A09BC0",marginBottom:24}}>
        Agrega Pokémon desde el comparador o directamente aquí
      </div>
      <button onClick={onAddNew}
        style={{padding:"12px 24px",background:"linear-gradient(135deg,#4B2D8F,#7B4DBF)",
          border:"none",borderRadius:12,color:"#E8E4F0",fontSize:13,fontWeight:700}}>
        + AGREGAR POKÉMON
      </button>
    </div>
  );

  const sorted = [...roster].sort((a,b) => totalScore(b) - totalScore(a));

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:"#555577",fontFamily:"monospace"}}>TU ROSTER</div>
          <div style={{fontSize:18,fontWeight:700}}>{roster.length} Pokémon guardados</div>
        </div>
        <button onClick={onAddNew}
          style={{padding:"8px 14px",background:"rgba(75,45,143,0.4)",
            border:"1px solid rgba(75,45,143,0.6)",borderRadius:20,color:"#E8E4F0",fontSize:12,fontWeight:600}}>
          + AGREGAR
        </button>
      </div>
      {sorted.map((p,i) => (
        <PokemonCard key={p.id||i} pokemon={p} onRemoveFromRoster={onRemove}/>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
const DEMO = [
  {id:"demo1",name:"Pochi",species:"Latios",level:27,rp:1427,frequency:"38 mins 2 secs",carryLimit:19,specialty:"Berries",
   nature:"Bashful",natureBuff:null,natureNerf:null,
   subskills:{10:{name:"Helping Speed M",locked:false},25:{name:"Skill Level Up S",locked:false},
     50:{name:"Helping Speed S",locked:true},70:{name:"Dream Shard Bonus",locked:true},80:{name:"Research EXP Bonus",locked:true}},
   verdict:"El mejor de los tres. Helping Speed M en Lv.10 es uno de los arranques más valiosos. A Lv.50 suma Helping Speed S — doble stack de velocidad."},
  {id:"demo2",name:"Vaughan",species:"Latios",level:27,rp:1381,frequency:"39 mins 48 secs",carryLimit:19,specialty:"Berries",
   nature:"Lonely",natureBuff:"Speed of Help",natureNerf:"Energy Recovery",
   subskills:{10:{name:"Skill Trigger S",locked:false},25:{name:"Skill Level Up S",locked:false},
     50:{name:"Helping Speed S",locked:true},70:{name:"Inventory Up S",locked:true},80:{name:"Skill Trigger M",locked:true}},
   verdict:"Sólido con potencial a largo plazo. Lonely actúa como subskill gratis de velocidad. Skill Trigger M en Lv.80 es prometedor."},
  {id:"demo3",name:"Bianco",species:"Latios",level:28,rp:1506,frequency:"44 mins 8 secs",carryLimit:19,specialty:"Berries",
   nature:"Docile",natureBuff:null,natureNerf:null,
   subskills:{10:{name:"Sleep EXP Bonus",locked:false},25:{name:"Skill Level Up S",locked:false},
     50:{name:"Inventory Up L",locked:true},70:{name:"Helping Speed S",locked:true},80:{name:"Skill Trigger S",locked:true}},
   verdict:"Sleep EXP Bonus en Lv.10 desperdicia el slot más valioso. Su mejor subskill está en Lv.70 — requiere inversión masiva."},
];

function App() {
  const [view, setView] = useState(VIEWS.COMPARE);
  const [compared, setCompared] = useState(DEMO);
  const [roster, setRoster] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pks_roster") || "[]"); }
    catch { return []; }
  });

  useEffect(() => {
    localStorage.setItem("pks_roster", JSON.stringify(roster));
  }, [roster]);

  function addToRoster(pokemon) {
    if (roster.find(p => p.id === pokemon.id)) return;
    setRoster(prev => [...prev, {...pokemon, id: pokemon.id || pokemon.name + "_" + Date.now()}]);
  }

  function removeFromRoster(id) {
    setRoster(prev => prev.filter(p => p.id !== id));
  }

  function handleAnalyzed(pokemons) {
    setCompared(pokemons);
    setView(VIEWS.COMPARE);
  }

  const sorted = [...compared].sort((a,b) => totalScore(b) - totalScore(a));
  const rosterIds = new Set(roster.map(p => p.id));

  const NAV = [
    { id: VIEWS.COMPARE, label: "Comparar", icon: "⚔️" },
    { id: VIEWS.ANALYZE, label: "Analizar", icon: "🔍" },
    { id: VIEWS.ROSTER,  label: "Roster",   icon: "📋" },
  ];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0D1B2A 0%,#0a1220 60%,#130a28 100%)",
      paddingBottom:70}}>

      {/* Header */}
      <div style={{background:"rgba(75,45,143,0.15)",borderBottom:"1px solid rgba(75,45,143,0.3)",
        padding:"14px 16px",position:"sticky",top:0,backdropFilter:"blur(12px)",zIndex:10}}>
        <div style={{fontSize:18,fontWeight:800,color:"#E8E4F0"}}>🌙 SLEEP OPTIMIZER</div>
        <div style={{fontSize:10,color:"#4B2D8F",fontFamily:"monospace",letterSpacing:"0.1em"}}>POKÉMON SLEEP · COMPARADOR & ROSTER</div>
      </div>

      {/* Content */}
      <div style={{padding:"20px 16px",maxWidth:480,margin:"0 auto"}}>
        {view === VIEWS.COMPARE && (
          <div>
            <div style={{background:"rgba(75,45,143,0.15)",border:"1px solid rgba(75,45,143,0.25)",
              borderRadius:12,padding:"14px 16px",marginBottom:20,
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,color:"#555577",fontFamily:"monospace",marginBottom:2}}>RECOMENDACIÓN</div>
                <div style={{fontSize:16,fontWeight:700,color:"#F0C040"}}>Invertir en {sorted[0]?.name}</div>
              </div>
              <div style={{background:"rgba(240,192,64,0.15)",border:"1px solid rgba(240,192,64,0.3)",
                borderRadius:8,padding:"6px 12px",fontSize:11,color:"#F0C040",fontFamily:"monospace"}}>
                {sorted.length} Pokémon
              </div>
            </div>
            {sorted.map((p,i) => (
              <PokemonCard key={p.id||i} pokemon={p} rank={i} isWinner={i===0}
                onAddToRoster={addToRoster} inRoster={rosterIds.has(p.id)}/>
            ))}
            <div style={{padding:12,background:"rgba(255,255,255,0.03)",borderRadius:8,
              fontSize:10,color:"#555577",fontFamily:"monospace",lineHeight:1.6}}>
              * Análisis basado en subskills activos + proyección a Lv.70 · Update 3.6.0
            </div>
          </div>
        )}
        {view === VIEWS.ANALYZE && <AnalyzeView onAnalyzed={handleAnalyzed}/>}
        {view === VIEWS.ROSTER && (
          <RosterView roster={roster} onRemove={removeFromRoster}
            onAddNew={()=>setView(VIEWS.ROSTER_ADD)}/>
        )}
        {view === VIEWS.ROSTER_ADD && (
          <RosterAddView onAdd={addToRoster} onBack={()=>setView(VIEWS.ROSTER)}/>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(13,27,42,0.95)",
        borderTop:"1px solid rgba(75,45,143,0.3)",backdropFilter:"blur(12px)",
        display:"flex",zIndex:10}}>
        {NAV.map(n => (
          <button key={n.id} onClick={()=>setView(n.id)}
            style={{flex:1,padding:"12px 8px",background:"transparent",border:"none",
              color:view===n.id?"#F0C040":"#555577",
              borderTop:view===n.id?"2px solid #F0C040":"2px solid transparent",
              display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:18}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:600,letterSpacing:"0.05em"}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
